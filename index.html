<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Maze Flame</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
</style>
</head>
<body>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.158.0/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.158.0/examples/jsm/controls/OrbitControls.js?module";

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x000814);

let camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 6, 10);

let renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let controls = new OrbitControls(camera, renderer.domElement);
controls.enablePan = false;
controls.enableZoom = false;

let ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

let light = new THREE.PointLight(0xffaa33, 2);
light.position.set(0,5,0);
scene.add(light);

const cellSize = 1;
const wallHeight = 1.2;

let player = new THREE.Group();

let glass = new THREE.MeshPhysicalMaterial({
    transmission: 1,
    roughness: 0,
    thickness: 0.5,
    clearcoat: 1
});

let sphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.4,32,32),
    glass
);

let flame = new THREE.Mesh(
    new THREE.SphereGeometry(0.2,16,16),
    new THREE.MeshBasicMaterial({color:0xff5500})
);

player.add(sphere);
player.add(flame);
scene.add(player);

let move = {w:false,a:false,s:false,d:false};
let clock = new THREE.Clock();

document.addEventListener("keydown",(e)=>{ if(move[e.key]!=undefined) move[e.key]=true; });
document.addEventListener("keyup",(e)=>{ if(move[e.key]!=undefined) move[e.key]=false; });

function loadMaze(){
    let img = new Image();
    img.crossOrigin = "anonymous";
    img.src = "maze.png";
    
    img.onload = function(){
console.log("Maze loaded", img.width, img.height);        let canvas = document.createElement("canvas");
        let ctx = canvas.getContext("2d");
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img,0,0);

        let data = ctx.getImageData(0,0,img.width,img.height).data;

        for(let y=0;y<img.height;y++){
            for(let x=0;x<img.width;x++){
                let i = (y*img.width+x)*4;
                let r = data[i];

                if(r > 150){
                    let wall = new THREE.Mesh(
                        new THREE.BoxGeometry(cellSize,wallHeight,cellSize),
                        new THREE.MeshStandardMaterial({color:0x1b263b})
                    );

                    wall.position.set(
                        x-img.width/2,
                        wallHeight/2,
                        y-img.height/2
                    );

                    scene.add(wall);
                }
            }
        }

        player.position.set(
            -img.width/2+1,
            0.4,
            -img.height/2+1
        );
    };
}

function animate(){
    requestAnimationFrame(animate);

    let delta = clock.getDelta();
    let speed = 3*delta;

    if(move.w) player.position.z -= speed;
    if(move.s) player.position.z += speed;
    if(move.a) player.position.x -= speed;
    if(move.d) player.position.x += speed;

    flame.scale.y = 1 + Math.sin(Date.now()*0.01)*0.2;

    controls.target.copy(player.position);

    renderer.render(scene,camera);
}

loadMaze();
animate();

window.addEventListener("resize",()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
