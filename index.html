<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Maze Flame</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
</style>
</head>
<body>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/controls/OrbitControls.js";

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x001d2e);

let camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 6, 10);

let renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

let controls = new OrbitControls(camera, renderer.domElement);
controls.enablePan = false;
controls.enableZoom = false;

let ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

let light = new THREE.PointLight(0xffaa33, 2);
light.position.set(0,5,0);
light.castShadow = true;
scene.add(light);

const cellSize = 1;
const wallHeight = 1.2;

let textureLoader = new THREE.TextureLoader();

// Sand texture
let sandTexture = textureLoader.load(
  "https://threejs.org/examples/textures/terrain/sand.jpg"
);
sandTexture.wrapS = sandTexture.wrapT = THREE.RepeatWrapping;
sandTexture.repeat.set(50,50);

// Water texture for walls
let waterTexture = textureLoader.load(
  "https://threejs.org/examples/textures/water.jpg"
);
waterTexture.wrapS = waterTexture.wrapT = THREE.RepeatWrapping;
waterTexture.repeat.set(1,1);

// Floor
let floor = new THREE.Mesh(
  new THREE.PlaneGeometry(500,500),
  new THREE.MeshStandardMaterial({ map:sandTexture })
);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

let player = new THREE.Group();

let glass = new THREE.MeshPhysicalMaterial({
    transmission: 1,
    roughness: 0,
    thickness: 0.5,
    clearcoat: 1
});

let sphere = new THREE.Mesh(
    new THREE.SphereGeometry(0.4,32,32),
    glass
);
sphere.castShadow = true;

let flame = new THREE.Mesh(
    new THREE.SphereGeometry(0.2,16,16),
    new THREE.MeshBasicMaterial({color:0xff5500})
);

player.add(sphere);
player.add(flame);
scene.add(player);

let move = {w:false,a:false,s:false,d:false};
let clock = new THREE.Clock();

document.addEventListener("keydown",(e)=>{ if(move[e.key]!=undefined) move[e.key]=true; });
document.addEventListener("keyup",(e)=>{ if(move[e.key]!=undefined) move[e.key]=false; });

function loadMaze(){
    let img = new Image();
    img.src = "maze.png";

    img.onload = function(){

        let canvas = document.createElement("canvas");
        let ctx = canvas.getContext("2d");
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img,0,0);

        let data = ctx.getImageData(0,0,img.width,img.height).data;

        for(let y=0;y<img.height;y++){
            for(let x=0;x<img.width;x++){
                let i = (y*img.width+x)*4;
                let r = data[i];

                if(r > 150){

                    let wall = new THREE.Mesh(
                        new THREE.BoxGeometry(cellSize,wallHeight,cellSize),
                        new THREE.MeshStandardMaterial({ map: waterTexture })
                    );

                    wall.position.set(
                        x-img.width/2,
                        wallHeight/2,
                        y-img.height/2
                    );

                    wall.castShadow = true;
                    wall.receiveShadow = true;

                    scene.add(wall);
                }
            }
        }

        player.position.set(
            -img.width/2+1,
            0.4,
            -img.height/2+1
        );
    };
}

function animate(){
    requestAnimationFrame(animate);

    let delta = clock.getDelta();
    let speed = 3*delta;

    if(move.w) player.position.z -= speed;
    if(move.s) player.position.z += speed;
    if(move.a) player.position.x -= speed;
    if(move.d) player.position.x += speed;

    flame.scale.y = 1 + Math.sin(Date.now()*0.01)*0.2;

    controls.target.copy(player.position);

    renderer.render(scene,camera);
}

loadMaze();
animate();

window.addEventListener("resize",()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
